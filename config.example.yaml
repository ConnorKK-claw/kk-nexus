# KK Nexus 跨设备配置示例
# 复制为 config.yaml 并填入你的实际路径
#
# 支持的占位符：
#   %USERPROFILE%  → 用户主目录
#   %ONEDRIVE%     → Windows OneDrive 根路径
#   %CODEX_HOME%   → ~/.codex 或 CODEX_HOME 环境变量
#   %PYTHON%       → PYTHON 环境变量或 sys.executable
#
# 设计目的：同一份 config.yaml 在多台机器上无需修改即可工作

version: '2.0'

# 项目根目录
project_root: '%ONEDRIVE%\path\to\your-project'

# Codex 路径
codex_home: '%USERPROFILE%\.codex'

# 员工 vault 路由规则（按需添加）
vault_routing_rules:
  - pattern: 'financial[-_]analysis'
    vault: '%CODEX_HOME%\skills\financial-analysis\vault'
    label: 'financial-analysis'
  - pattern: 'equity[-_]incentive'
    vault: '%CODEX_HOME%\skills\equity-incentive\vault'
    label: 'equity-incentive'
  # 添加更多路由规则...
